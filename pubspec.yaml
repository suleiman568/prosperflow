name: prosperflow
description: "ProsperFlow — digital sales ledger for Nigerian market traders."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  drift: 2.26.1
  path_provider: ^2.1.6
  path: ^1.9.1
  uuid: ^4.5.3
  sqlite3_flutter_libs: 0.5.34
  supabase_flutter: ^2.16.0
  connectivity_plus: ^7.2.0
  pdf: ^3.11.3
  printing: ^5.14.2
  csv: ^6.0.0
  share_plus: ^12.0.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqlite3: ^2.9.4
  drift_dev: 2.26.1
  build_runner: 2.4.15

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900
